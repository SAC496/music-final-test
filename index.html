<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SongCards Study</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="aurora aurora-1" aria-hidden="true"></div>
    <div class="aurora aurora-2" aria-hidden="true"></div>

    <main class="page">
      <header class="hero">
        <p class="eyebrow">SongCards</p>
        <h1>Study music like flashcards.</h1>
        <p class="subtitle">
          Each card front is a Spotify track player. Flip to reveal your answer,
          memory prompt, or note.
        </p>
      </header>

      <section class="panel study-panel" aria-labelledby="study-title">
        <div class="panel-head">
          <h2 id="study-title">Study Deck</h2>
          <div class="study-head-actions">
            <p id="counter" class="counter">0 / 0</p>
            <button id="resetDeck" class="ghost" type="button">Reset</button>
          </div>
        </div>

        <div id="cardShell" class="card-shell empty">
          <article id="flashcard" class="flashcard" aria-live="polite">
            <div class="face front">
              <p>Press flip to reveal the notes.</p>
            </div>
            <div class="face back">
              <p>Your answer will appear here.</p>
            </div>
          </article>
        </div>

        <div class="controls">
          <button id="prevBtn" type="button">Previous</button>
          <button id="flipBtn" type="button" class="accent">Flip</button>
          <button id="nextBtn" type="button">Next</button>
          <button id="shuffleBtn" type="button" class="ghost">Shuffle</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
